
<!DOCTYPE html>
<html>
<head>
    <title>Ciudades de Colombia - API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Ciudades Colombianas <small class="text-muted">({{ count }} de {{ total }})</small></h2>
        
        {% if query %}
            <p class="alert alert-info">Buscando: <strong>"{{ query }}"</strong></p>
        {% endif %}
        
        <form method="GET" class="mb-4">
            <div class="input-group">
                <input type="text" name="q" class="form-control" placeholder="Buscar ciudad o departamento..." value="{{ query }}">
                <button class="btn btn-primary" type="submit">Buscar</button>
                <a href="{% url 'cities_list' %}" class="btn btn-secondary">Limpiar</a>
            </div>
        </form>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Ciudad</th>
                        <th>Departamento</th>
                    </tr>
                </thead>
                <tbody>
                    {% for city in cities %}
                    <tr>
                        <td>{{ city.id }}</td>
                        <td>{{ city.name }}</td>
                        <td>{{ city.dept_name }}</td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="3" class="text-center">No se encontraron ciudades</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
