<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Eliminación | TechStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood-dark: #3e2723;
            --wood-accent: #c08552;
            --wood-light: #d7ccc8;
            --bg-color: #f5f0eb;
            --white: #ffffff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background-color: var(--bg-color);
        }
        .container {
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: var(--wood-dark);
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .service-name {
            color: var(--wood-accent);
            font-weight: 700;
            font-size: 1.2rem;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 0 10px;
            transition: all 0.3s;
        }
        .btn-danger {
            background: #dc3545;
            color: var(--white);
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn-secondary {
            background: var(--wood-light);
            color: var(--wood-dark);
        }
        .btn-secondary:hover {
            background: var(--wood-accent);
            color: var(--white);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Confirmar Eliminación</h1>
        <p>¿Estás seguro de que quieres eliminar el servicio?</p>
        <p class="service-name">{{ service.name }}</p>
        <p>Esta acción no se puede deshacer.</p>
        
        <form method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
        </form>
        <a href="{% url 'service_list' %}" class="btn btn-secondary">Cancelar</a>
    </div>
</body>
</html>
